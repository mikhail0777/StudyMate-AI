<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask From Notes | StudyMate AI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f6f8fc, #e9eef7);
            color: #1f2937;
        }

        .page {
            max-width: 950px;
            margin: 0 auto;
            padding: 48px 20px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #172554;
        }

        p {
            color: #4b5563;
            line-height: 1.6;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: 700;
            color: #1e293b;
        }

        textarea,
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }

        textarea {
            min-height: 220px;
            resize: vertical;
        }

        .error {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fee2e2;
            color: #991b1b;
            font-weight: 600;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button,
        .back-link {
            display: inline-block;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 0.96rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        button {
            background: #2563eb;
            color: white;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back-link {
            background: #e2e8f0;
            color: #1e293b;
        }

        .back-link:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Ask a Question From Your Notes</h1>
            <p>
                Paste your study material and ask a specific question. StudyMate AI will return
                an answer based only on the context you provide.
            </p>

            <form method="POST" action="/ask">
                <label for="context">Study Material</label>
                <textarea
                    id="context"
                    name="context"
                    placeholder="Paste your lecture notes, textbook excerpt, or reference material here..."
                    required
                ></textarea>

                <label for="question">Your Question</label>
                <input
                    id="question"
                    type="text"
                    name="question"
                    placeholder="Example: What is the main concept explained in this passage?"
                    required
                >

                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}

                <div class="actions">
                    <button type="submit">Get Answer</button>
                    <a class="back-link" href="/">Back to Home</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
