<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | StudyMate AI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f6f8fc, #e9eef7);
            color: #1f2937;
        }

        .page {
            max-width: 950px;
            margin: 0 auto;
            padding: 48px 20px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #172554;
        }

        p {
            color: #4b5563;
            line-height: 1.6;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 700;
            color: #1e293b;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }

        textarea {
            min-height: 130px;
            resize: vertical;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .error {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fee2e2;
            color: #991b1b;
            font-weight: 600;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button,
        .back-link {
            display: inline-block;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 0.96rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        button {
            background: #2563eb;
            color: white;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back-link {
            background: #e2e8f0;
            color: #1e293b;
        }

        .back-link:hover {
            background: #cbd5e1;
        }

        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Build a Study Plan</h1>
            <p>
                Enter your syllabus, main topics, and timeline to generate a structured study plan
                with realistic goals and task breakdowns.
            </p>

            <form method="POST" action="/study-plan">
                <label for="syllabus">Course Syllabus or Overview</label>
                <textarea
                    id="syllabus"
                    name="syllabus"
                    placeholder="Paste your course outline, unit list, or syllabus summary..."
                    required
                ></textarea>

                <label for="topics">Topics to Focus On</label>
                <textarea
                    id="topics"
                    name="topics"
                    placeholder="List the topics, chapters, or concepts you want to prioritize..."
                    required
                ></textarea>

                <div class="grid">
                    <div>
                        <label for="start_date">Start Date</label>
                        <input id="start_date" type="date" name="start_date" required>
                    </div>

                    <div>
                        <label for="deadline">Deadline</label>
                        <input id="deadline" type="date" name="deadline" required>
                    </div>
                </div>

                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}

                <div class="actions">
                    <button type="submit">Generate Study Plan</button>
                    <a class="back-link" href="/">Back to Home</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
