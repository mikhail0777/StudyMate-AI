<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Plan Result | StudyMate AI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f6f8fc, #e9eef7);
            color: #1f2937;
        }

        .page {
            max-width: 950px;
            margin: 0 auto;
            padding: 48px 20px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #172554;
        }

        .plan-box {
            margin-top: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 0.96rem;
            font-weight: 600;
            text-decoration: none;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Your Study Plan</h1>

            <div class="plan-box">{{ study_plan }}</div>

            <div class="actions">
                <a class="btn btn-primary" href="/study-plan">Create Another Plan</a>
                <a class="btn btn-secondary" href="/">Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
